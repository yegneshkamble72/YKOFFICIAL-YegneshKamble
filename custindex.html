<style>

/* background animation */

body{
background:linear-gradient(-45deg,#0f172a,#64637e,#000000,#1e1b4b);
background-size:400% 400%;

}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* glass card */

.glass{
backdrop-filter:blur(14px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
}

/* loader */

.loader{
width:60px;
height:60px;
border-radius:50%;
border:5px solid #ffffff30;
border-top:5px solid #6366f1;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* popup animation */

.popup{
animation:pop .35s ease;
}

@keyframes pop{
0%{transform:scale(.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

</style>

</head>

<body class="min-h-screen text-white flex flex-col">

<nav class="flex justify-between items-center px-6 py-4 bg-black/40 backdrop-blur-md">

class="bg-indigo-600 text-white px-6 py-2 rounded">

<h2 class="text-xl font-bold mb-3">
YK OFFICIAL TEAM
</h2>

<p class="mb-2 " >📧 yegnesh7219@gmail.com</p>

<p class="mb-4">🌐 YK OFFICIAL Support Team</p>

<button onclick="closeContact()"
class="bg-indigo-600 text-white px-6 py-2 rounded">
Close
</button>

</div>

</div>



<script>

emailjs.init("IjcMdGc7hhe75v6JE")

let otpCode

const API="https://script.google.com/macros/s/AKfycbwnBjAJdDDIwefyafJ1_1jAh84Vsgr9oslrvaPTYC5BN5Bpra-PkfgcDQ4dlWGw7q6T/exec"


/* loader */

function showLoader(){
document.getElementById("loader").style.display="flex"
}

function hideLoader(){
document.getElementById("loader").style.display="none"
}


/* popup */

function showPopup(title,msg){

document.getElementById("popupTitle").innerText=title
document.getElementById("popupMsg").innerText=msg
document.getElementById("popup").style.display="flex"

}

function closePopup(){
document.getElementById("popup").style.display="none"
}


/* contact */

function showContact(){
document.getElementById("contact").style.display="flex"
}

function closeContact(){
document.getElementById("contact").style.display="none"
}


/* help */

function showHelp(){

showPopup(
"Form Instructions",

`Step 1: Enter Email
Step 2: Click Send OTP
Step 3: Check your Email
Step 4: Enter OTP and Verify
Step 5: Fill your details
Step 6: Submit Request

YK Official team will contact you soon.`

)

}


/* send otp */

async function sendOTP(){

let email=document.getElementById("email").value

if(!email){
showPopup("Error","Enter email first")
return
}

otpCode=Math.floor(100000+Math.random()*900000)

showLoader()

try{

await emailjs.send(
"service_9uwcu9x",
"template_51t8llg",
{
email:email,
otp:otpCode
}
)

hideLoader()
showPopup("OTP Sent","Check your email")

}catch(e){

hideLoader()
showPopup("Error","OTP send failed")

}

}


/* verify otp */

function verifyOTP(){

let user=document.getElementById("otp").value

if(user==otpCode){

document.getElementById("form").style.display="block"
showPopup("Verified","Email verified. Fill the form.")

}else{

showPopup("Error","Invalid OTP")

}

}


/* customer id */

function generateCustomerID(name){

let counter = localStorage.getItem("customerCounter")

if(!counter){
counter = 1
}else{
counter = parseInt(counter) + 1
}

localStorage.setItem("customerCounter", counter)

// split name
let parts = name.trim().split(" ")

let first = parts[0].charAt(0).toUpperCase()
let last = parts.length > 1 ? parts[parts.length-1].charAt(0).toUpperCase() : "X"

let number = String(counter).padStart(4,"0")

return first + last + number

}


/* submit */

async function submitForm(){

let btn=document.getElementById("submitBtn")
btn.disabled=true

let name=document.getElementById("name").value

let customerID = generateCustomerID(name)

let data={

id:customerID,
name:name,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
service:document.getElementById("service").value,
message:document.getElementById("message").value

}

showLoader()

try{

await fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

await emailjs.send(
"service_9uwcu9x",
"template_94xq6yl",
{
name:data.name,
email:data.email,
phone:data.phone,
service:data.service,
customer_id:customerID
}
)

hideLoader()

showPopup("Success","Customer ID: "+customerID+"\nPage will refresh")

setTimeout(()=>{
location.reload()
},3000)

}catch(err){

hideLoader()
btn.disabled=false
showPopup("Error","Submission failed")

}

}

</script>
